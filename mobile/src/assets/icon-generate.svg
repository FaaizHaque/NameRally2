<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background: warm cream matching home screen -->
  <rect width="1024" height="1024" fill="#F2EAD0"/>

  <!-- Subtle notebook line texture -->
  <rect width="1024" height="1024" fill="url(#paper)" opacity="0.18"/>

  <defs>
    <!-- Drop shadows for tiles -->
    <filter id="shadow-n" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#882020" flood-opacity="0.22"/>
    </filter>
    <filter id="shadow-p" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#8B7A10" flood-opacity="0.22"/>
    </filter>
    <filter id="shadow-a" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2A6640" flood-opacity="0.22"/>
    </filter>
    <filter id="shadow-t" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#205880" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- N tile — top-left — pink/red -->
  <rect x="72" y="72" width="420" height="420" rx="44" ry="44"
        fill="#FFD4D4" stroke="#E07070" stroke-width="8" filter="url(#shadow-n)"/>
  <!-- Inner highlight -->
  <rect x="80" y="80" width="404" height="100" rx="36" ry="36" fill="white" opacity="0.22"/>
  <text x="282" y="342" font-family="'Helvetica Neue', Arial, sans-serif" font-size="240"
        font-weight="900" fill="#882020" text-anchor="middle" dominant-baseline="auto"
        letter-spacing="-6">N</text>

  <!-- P tile — top-right — yellow -->
  <rect x="532" y="72" width="420" height="420" rx="44" ry="44"
        fill="#FEF3A3" stroke="#E8D840" stroke-width="8" filter="url(#shadow-p)"/>
  <rect x="540" y="80" width="404" height="100" rx="36" ry="36" fill="white" opacity="0.22"/>
  <text x="742" y="342" font-family="'Helvetica Neue', Arial, sans-serif" font-size="240"
        font-weight="900" fill="#8B7A10" text-anchor="middle" dominant-baseline="auto"
        letter-spacing="-6">P</text>

  <!-- A tile — bottom-left — green -->
  <rect x="72" y="532" width="420" height="420" rx="44" ry="44"
        fill="#C8F5D0" stroke="#50B870" stroke-width="8" filter="url(#shadow-a)"/>
  <rect x="80" y="540" width="404" height="100" rx="36" ry="36" fill="white" opacity="0.22"/>
  <text x="282" y="802" font-family="'Helvetica Neue', Arial, sans-serif" font-size="240"
        font-weight="900" fill="#2A6640" text-anchor="middle" dominant-baseline="auto"
        letter-spacing="-6">A</text>

  <!-- T tile — bottom-right — blue -->
  <rect x="532" y="532" width="420" height="420" rx="44" ry="44"
        fill="#D0EAFF" stroke="#60A8E0" stroke-width="8" filter="url(#shadow-t)"/>
  <rect x="540" y="540" width="404" height="100" rx="36" ry="36" fill="white" opacity="0.22"/>
  <text x="742" y="802" font-family="'Helvetica Neue', Arial, sans-serif" font-size="240"
        font-weight="900" fill="#205880" text-anchor="middle" dominant-baseline="auto"
        letter-spacing="-6">T</text>
</svg>
